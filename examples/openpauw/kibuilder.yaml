    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
  PH_1x08:
    step: Connector_PinHeader_2.54mm.3dshapes/PinHeader_1x08_P2.54mm_Vertical.step
    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
  PH_1x12:
    step: Connector_PinHeader_2.54mm.3dshapes/PinHeader_1x12_P2.54mm_Vertical.step
    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
  PS_1x12:
    step: Connector_PinSocket_2.54mm.3dshapes/PinSocket_1x12_P2.54mm_Vertical.step
