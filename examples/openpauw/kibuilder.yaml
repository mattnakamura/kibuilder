project:
  pcb: ../../../OpenPauw/cad/OpenPauw.kicad_pcb
  output: ../../../OpenPauw/cad/media/assembly
  step_search_paths:
  - /Applications/KiCad/KiCad.app/Contents/SharedSupport/3dmodels
  - ../../../OpenPauw/cad/footprints
components:
  D_SMA:
    step: Diode_SMD.3dshapes/D_SMA.step
    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
  SOT235:
    step: Package_TO_SOT_SMD.3dshapes/SOT-23-5.step
    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
  JST_PH:
    step: 3dmodels/JST_B4B-PH-SM4-TB.step
    rot_x: 90.0
    rot_y: 0.0
    rot_z: 0.0
  R_AXIAL:
    step: Resistor_THT.3dshapes/R_Axial_DIN0207_L6.3mm_D2.5mm_P7.62mm_Horizontal.step
    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
  DIP16_SOCKET:
